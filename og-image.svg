<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#142240"/>
      <stop offset="100%" style="stop-color:#1B3A5C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Subtle radial glow -->
  <circle cx="900" cy="315" r="400" fill="rgba(46,107,166,0.12)"/>
  <!-- Gold accent line -->
  <rect x="80" y="180" width="60" height="4" rx="2" fill="#C5A44E"/>
  <!-- Company name -->
  <text x="80" y="260" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="72" fill="#FFFFFF" letter-spacing="-1">
    <tspan fill="#C5A44E">SDV</tspan> Commodity Group
  </text>
  <!-- Tagline -->
  <text x="80" y="320" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="32" fill="rgba(255,255,255,0.65)">Federal Supply Chain Solutions</text>
  <!-- Certifications bar -->
  <text x="80" y="420" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="22" fill="#C5A44E" letter-spacing="2">SDVOSB VERIFIED</text>
  <text x="340" y="420" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="22" fill="rgba(255,255,255,0.4)" letter-spacing="2">|</text>
  <text x="370" y="420" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="22" fill="#C5A44E" letter-spacing="2">SAM.GOV REGISTERED</text>
  <!-- Domain -->
  <text x="80" y="520" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.5)">sdvcommoditygroup.com</text>
  <!-- Bottom gold accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#C5A44E"/>
</svg>
